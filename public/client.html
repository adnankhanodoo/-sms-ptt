<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SMS IoT - Client PTT</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',sans-serif;background:#0f1117;color:#e0e0e0;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;user-select:none}
  .card{background:#1a1d27;border:1px solid #2a2d3a;border-radius:16px;padding:40px;text-align:center;width:340px}
  h1{font-size:20px;color:#fff;margin-bottom:6px}
  .sub{font-size:13px;color:#666;margin-bottom:30px}
  .btn{width:150px;height:150px;border-radius:50%;border:none;cursor:pointer;font-size:50px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;transition:all 0.15s;-webkit-tap-highlight-color:transparent;touch-action:none}
  .btn.idle{border:3px solid #333;background:#1e2130}
  .btn.ready{border:3px solid #22c55e;background:#0f2a1a;box-shadow:0 0 20px #22c55e44;cursor:pointer}
  .btn.active{border:3px solid #ef4444;background:#2a0f0f;box-shadow:0 0 40px #ef444488;transform:scale(0.95)}
  .btn.connecting{border:3px solid #f59e0b;background:#2a1f0f;animation:pulse 1s infinite}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
  .lbl{font-size:16px;font-weight:600;margin-bottom:6px}
  .hint{font-size:11px;color:#444;margin-bottom:24px}
  .dots{display:flex;gap:16px;justify-content:center;margin-bottom:20px}
  .di{display:flex;align-items:center;gap:6px;font-size:12px;color:#666}
  .dot{width:8px;height:8px;border-radius:50%;background:#333;transition:all .3s}
  .dot.on{background:#22c55e;box-shadow:0 0 6px #22c55e}
  .dot.blue{background:#3b82f6;box-shadow:0 0 6px #3b82f6}
  .dot.red{background:#ef4444;box-shadow:0 0 6px #ef4444;animation:pulse 0.8s infinite}
  .log{background:#0f1117;border-radius:8px;padding:10px;font-size:11px;color:#555;text-align:left;max-height:80px;overflow-y:auto;font-family:monospace}
  .log .ok{color:#22c55e}.log .info{color:#3b82f6}.log .warn{color:#f59e0b}
</style>
</head>
<body>
<div class="card">
  <h1>📱 Client PTT</h1>
  <p class="sub">Press and hold to speak</p>
  <button class="btn idle" id="btn" disabled>🎙️</button>
  <div class="lbl" id="lbl">Starting...</div>
  <div class="hint" id="hint">Please wait</div>
  <div class="dots">
    <div class="di"><div class="dot" id="dMic"></div><span>Mic</span></div>
    <div class="di"><div class="dot" id="dConn"></div><span>Connected</span></div>
    <div class="di"><div class="dot" id="dPtt"></div><span>Transmitting</span></div>
  </div>
  <div class="log" id="log"></div>
</div>
<script>
const TOWER = location.hostname;
const MTX = 8189;
let stream, pc, track;
let connected = false;

function log(m,t=''){
  const e=document.getElementById('log'),d=document.createElement('div');
  d.className=t;d.textContent='['+new Date().toLocaleTimeString()+'] '+m;
  e.appendChild(d);e.scrollTop=e.scrollHeight;
}
function dot(id,cls){document.getElementById(id).className='dot'+(cls?' '+cls:'');}
function ui(btnCls,lbl,hint,en=true){
  document.getElementById('btn').className='btn '+btnCls;
  document.getElementById('btn').disabled=!en;
  document.getElementById('lbl').textContent=lbl;
  document.getElementById('hint').textContent=hint;
}

function waitIce(pc,ms=5000){
  return new Promise(r=>{
    if(pc.iceGatheringState==='complete')return r();
    const t=setTimeout(r,ms);
    pc.addEventListener('icegatheringstatechange',()=>{
      if(pc.iceGatheringState==='complete'){clearTimeout(t);r();}
    });
  });
}

async function connect(){
  try{
    // Get mic with browser processing
    stream = await navigator.mediaDevices.getUserMedia({
      audio:{
        echoCancellation:true,
        noiseSuppression:true,
        autoGainControl:true
      }
    });
    track = stream.getAudioTracks()[0];
    track.enabled = false; // muted until PTT
    dot('dMic','on');
    log('Mic ready','ok');
    ui('connecting','Connecting to tower...','Please wait',false);

    // Create WebRTC connection
    pc = new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
    pc.addTrack(track, stream);

    pc.onconnectionstatechange = () => {
      log('State: '+pc.connectionState);
      if(pc.connectionState === 'connected'){
        connected = true;
        dot('dConn','on');
        ui('ready','Hold to Talk','Press and hold the button');
        document.getElementById('btn').disabled = false;
        log('Ready — press to talk','ok');
      } else if(['disconnected','failed'].includes(pc.connectionState)){
        connected = false;
        dot('dConn','');
        dot('dPtt','');
        ui('connecting','Reconnecting...','Please wait',false);
        log('Lost connection — reconnecting...','warn');
        setTimeout(connect, 3000);
      }
    };

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await waitIce(pc);

    const r = await fetch(`http://${TOWER}:${MTX}/client/whip`,{
      method:'POST',
      headers:{'Content-Type':'application/sdp'},
      body:pc.localDescription.sdp
    });
    if(!r.ok) throw new Error('WHIP '+r.status);
    await pc.setRemoteDescription({type:'answer', sdp:await r.text()});
    log('WHIP connected','ok');

  } catch(e){
    log('Error: '+e.message,'warn');
    ui('idle','Connection failed','Retrying...',false);
    setTimeout(connect, 5000);
  }
}

// PTT — instant mute/unmute, no new connection
function pttOn(){
  if(!connected || !track) return;
  track.enabled = true;
  dot('dPtt','red');
  ui('active','🔴 Transmitting','Release to stop');
  log('PTT ON','info');
}

function pttOff(){
  if(!track) return;
  track.enabled = false;
  dot('dPtt','');
  if(connected) ui('ready','Hold to Talk','Press and hold the button');
  log('PTT OFF','info');
}

const btn = document.getElementById('btn');
btn.addEventListener('mousedown', pttOn);
btn.addEventListener('mouseup', pttOff);
btn.addEventListener('mouseleave', pttOff);
btn.addEventListener('touchstart', e=>{e.preventDefault();pttOn();},{passive:false});
btn.addEventListener('touchend', e=>{e.preventDefault();pttOff();},{passive:false});
document.addEventListener('keydown', e=>{if(e.code==='Space'&&!e.repeat){e.preventDefault();pttOn();}});
document.addEventListener('keyup', e=>{if(e.code==='Space'){e.preventDefault();pttOff();}});

connect();
</script>
</body>
</html>
